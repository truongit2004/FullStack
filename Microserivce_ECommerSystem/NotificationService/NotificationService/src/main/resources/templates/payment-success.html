<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: auto; padding: 20px; border: 1px solid #eee;">
        <h2 style="color: #28a745;">Thanh toán thành công!</h2>
        <p>Xin chào <b><span th:text="${name}"></span></b>,</p>
        <p>Chúng tôi xác nhận đơn hàng <b>#<span th:text="${orderId}"></span></b> đã được thanh toán thành công qua VNPay.</p>
        <p><b>Số tiền:</b> <span th:text="${amount}"></span> VNĐ</p>
        <p>Đơn hàng của bạn đang được chuẩn bị và sẽ sớm được giao.</p>
        <hr>
        <p>Cảm ơn bạn đã tin tưởng nguyenkimtruongk4 Store!</p>
    </div>
</body>
</html>
