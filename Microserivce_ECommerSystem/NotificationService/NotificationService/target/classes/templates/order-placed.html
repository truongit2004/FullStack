<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: auto; padding: 20px; border: 1px solid #eee;">
        <h2 style="color: #007bff;">Đặt hàng thành công!</h2>
        <p>Xin chào <b><span th:text="${name}"></span></b>,</p>
        <p>Cảm ơn bạn đã đặt hàng tại hệ thống của chúng tôi. Đơn hàng <b>#<span th:text="${orderId}"></span></b> đã được khởi tạo thành công.</p>
        <p><b>Tổng giá trị đơn hàng:</b> <span th:text="${amount}"></span> VNĐ</p>
        <p>Vui lòng tiến hành thanh toán để chúng tôi có thể giao hàng cho bạn sớm nhất.</p>
        <hr>
        <p>Trân trọng,<br>Đội ngũ nguyenkimtruongk4</p>
    </div>
</body>
</html>
