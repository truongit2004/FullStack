


services:
  # ────────────────────────────────────────────────────────────────────────────
  # DATABASES (Microservices Isolated DBs)
  # ────────────────────────────────────────────────────────────────────────────
  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_service
    ports:
      - "33061:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  product-db:
    image: mysql:8.0
    container_name: product-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_service
    ports:
      - "33062:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  order-db:
    image: mysql:8.0
    container_name: order-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
    ports:
      - "33063:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  inventory-db:
    image: mysql:8.0
    container_name: inventory-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    ports:
      - "33064:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    ports:
      - "33065:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  review-db:
    image: mysql:8.0
    container_name: review-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: review_service_db
    ports:
      - "33066:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  shipping-db:
    image: mysql:8.0
    container_name: shipping-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shipping_service
    ports:
      - "33067:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  chat-db:
    image: mongo:latest
    container_name: chat-db
    ports:
      - "27017:27017"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cart:
    image: redis:latest
    container_name: redis-cart
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ecommerce-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10


  # ────────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ────────────────────────────────────────────────────────────────────────────
  eureka-server:
    build: 
      context: ./Eureka/Eureka
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network

  api-gateway:
    build:
      context: ./API Gateway/API-Gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8085:8085"
    environment:
      - EUREKA_HOST=eureka-server
      - REDIS_HOST=redis-cart
    depends_on:
      eureka-server:
        condition: service_started
      redis-cart:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ────────────────────────────────────────────────────────────────────────────
  # SERVICES
  # ────────────────────────────────────────────────────────────────────────────
  user-service:
    build:
      context: "./User Service/User-Service"
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8088:8088"
    environment:
      - DB_HOST=user-db
      - EUREKA_HOST=eureka-server
      - REDIS_HOST=redis-cart
      - SPRING_DATASOURCE_URL=jdbc:mysql://user-db:3306/user_service?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      user-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  product-service:
    build:
      context: ./ProductService/ProductService
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_HOST=eureka-server
      - SPRING_DATASOURCE_URL=jdbc:mysql://product-db:3306/product_service?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_PASSWORD=root
      - SERVICES_INVENTORY_URL=http://inventory-service:8086
      - KAFKA_HOST=kafka:29092
    volumes:
      - ./uploads/products:/app/uploads/products
    depends_on:
      product-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  inventory-service:
    build:
      context: ./InventoryService/InventoryService
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8086:8086"
    environment:
      - EUREKA_HOST=eureka-server
      - SPRING_DATASOURCE_URL=jdbc:mysql://inventory-db:3306/inventory_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      inventory-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  order-service:
    build:
      context: ./OrderService/OrderService
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_HOST=eureka-server
      - SPRING_DATASOURCE_URL=jdbc:mysql://order-db:3306/order_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      order-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  cart-service:
    build:
      context: ./CartService/CartService
      dockerfile: Dockerfile
    container_name: cart-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_HOST=eureka-server
      - SPRING_DATA_REDIS_HOST=redis-cart
      - SERVICES_PRODUCT_URL=http://product-service:8082
      - SERVICES_ORDER_URL=http://order-service:8084
      - SERVICES_INVENTORY_URL=http://inventory-service:8086
    depends_on:
      redis-cart:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  auth-service:
    build:
      context: ./Auth Service/Auth-Service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8087:8087"
    environment:
      - EUREKA_HOST=eureka-server
      - SPRING_DATA_REDIS_HOST=redis-cart
    depends_on:
      eureka-server:
        condition: service_started
      redis-cart:
        condition: service_healthy
    networks:
      - ecommerce-network

  payment-service:
    build:
      context: ./PaymentService/PaymentService
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8089:8089"
    environment:
      - EUREKA_HOST=eureka-server
      - KAFKA_HOST=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:mysql://payment-db:3306/payment_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      payment-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  notification-service:
    build:
      context: ./NotificationService/NotificationService
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8090:8090"
    environment:
      - EUREKA_HOST=eureka-server
      - KAFKA_HOST=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  chat-service:
    build:
      context: ./ChatService/ChatService
      dockerfile: Dockerfile
    container_name: chat-service
    ports:
      - "8092:8092"
    environment:
      - EUREKA_HOST=eureka-server
      - MONGO_HOST=chat-db
    depends_on:
      chat-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  review-service:
    build:
      context: ./ReviewService/ReviewService
      dockerfile: Dockerfile
    container_name: review-service
    ports:
      - "8091:8091"
    environment:
      - EUREKA_HOST=eureka-server
      - DB_HOST=review-db
      - SPRING_DATASOURCE_URL=jdbc:mysql://review-db:3306/review_service_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      review-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  shipping-service:
    build:
      context: ./ShippingService/ShippingService
      dockerfile: Dockerfile
    container_name: shipping-service
    ports:
      - "8093:8093"
    environment:
      - EUREKA_HOST=eureka-server
      - DB_HOST=shipping-db
      - SPRING_DATASOURCE_URL=jdbc:mysql://shipping-db:3306/shipping_service?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      shipping-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecommerce-network

  search-service:
    build:
      context: ./SearchService/SearchService
      dockerfile: Dockerfile
    container_name: search-service
    ports:
      - "8094:8094"
    environment:
      - EUREKA_HOST=eureka-server
      - ELASTICSEARCH_HOST=elasticsearch
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - KAFKA_HOST=kafka:29092
    depends_on:
      elasticsearch:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ────────────────────────────────────────────────────────────────────────────
  # FRONTEND
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../FE
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    networks:
      - ecommerce-network

  # ────────────────────────────────────────────────────────────────────────────
  # NGROK TUNNELS (Dành cho Demo)
  # ────────────────────────────────────────────────────────────────────────────
  ngrok-be:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "api-gateway:8085"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

  ngrok-fe:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "frontend:5173"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - frontend
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
