server:
  port: 8085

spring:
  application:
    name: API-Gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: cart-service
          uri: lb://CartService
          predicates:
            - Path=/api/cart/**

        - id: product-service-get
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**, /api/categories/**
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 1
                key-resolver: "#{@userKeyResolver}"

        - id: product-service-other
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**, /api/categories/**
            - Method=POST, PUT, DELETE, PATCH

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**

        - id: chat-service
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/ws/**, /api/chat/**

        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

        - id: shipping-service
          uri: lb://shipping-service
          predicates:
            - Path=/api/shipping/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**

  # Redis Configuration for Rate Limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

# JWT Configuration (Shared with other services)
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000
