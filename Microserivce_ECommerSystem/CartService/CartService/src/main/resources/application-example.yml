# ═══════════════════════════════════════════════════════════════════════════════
# QUICK START GUIDE
# ═══════════════════════════════════════════════════════════════════════════════

# 1️⃣ Generate JWT Secret
# openssl rand -base64 32

# 2️⃣ Copy this file to application.yml
# cp application-example.yml src/main/resources/application.yml

# 3️⃣ Update values in application.yml
# - jwt.secret (generated in step 1)
# - services.product-url (if different from default)
# - services.order-url (if different from default)
# - spring.data.redis.* (if Redis not on localhost:6379)

# 4️⃣ Start Redis
# docker run -d -p 6379:6379 redis:latest

# 5️⃣ Run application
# mvn spring-boot:run

# 6️⃣ Verify health
# curl http://localhost:8083/actuator/health

