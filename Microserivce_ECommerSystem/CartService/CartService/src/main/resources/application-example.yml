# ═══════════════════════════════════════════════════════════════════════════════
# NOTES
# ═══════════════════════════════════════════════════════════════════════════════

# ⚠️ IMPORTANT SECURITY GUIDELINES:
#
# 1. JWT Secret:
#    - NEVER commit actual secrets to git
#    - Use environment variables in production
#    - Minimum 256 bits (32 bytes) when decoded
#    - Generate using: openssl rand -base64 32
#
# 2. Redis Password:
#    - Set a strong password in production
#    - Use environment variables: ${REDIS_PASSWORD}
#    - Enable SSL/TLS for remote Redis
#
# 3. Service URLs:
#    - Use HTTPS in production
#    - Implement proper SSL certificates
#    - Use service discovery (Consul, Eureka) if available
#
# 4. Logging:
#    - Set to WARN/ERROR in production
#    - Use centralized logging (ELK, Splunk)
#    - Don't log sensitive information
#
# 5. SSL/TLS:
#    - Generate certificate: keytool -genkeypair -alias tomcat -keyalg RSA -keystore keystore.p12 -storetype PKCS12
#    - Update server.ssl.key-store and password
#
# ✅ TESTING CHECKLIST:
#
# [ ] Redis connection successful
# [ ] Service can start without errors
# [ ] JWT validation working
# [ ] API endpoints accessible with valid token
# [ ] Validation errors returned for invalid input
# [ ] Product Service integration working
# [ ] Order Service integration working

