# application-example.yml - Configuration Templates

## Copy file này thành application.yml và điền các giá trị của bạn

---
# ═══════════════════════════════════════════════════════════════════════════════
# DEVELOPMENT ENVIRONMENT
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8083
  servlet:
    context-path: /
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024

spring:
  application:
    name: Cart-Service
    version: 0.0.1-SNAPSHOT

  # Redis Configuration
  data:
    redis:
      host: localhost # 👉 Thay đổi nếu Redis ở máy khác
      port: 6379
      password: null # 👉 Set password nếu Redis yêu cầu
      timeout: 2000ms
      database: 0
      jedis:
        pool:
          max-active: 8 # Số connection tối đa
          max-idle: 8 # Số connection nhàn tối đa
          min-idle: 0 # Số connection nhàn tối thiểu
          max-wait: -1ms # Thời gian chờ tối đa (unlimited)

  # Logging Configuration
  logging:
    level:
      root: INFO
      com.example.CartService: DEBUG
      org.springframework.security: DEBUG
    pattern:
      console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ═══════════════════════════════════════════════════════════════════════════════
# SERVICE URLS (Inter-Service Communication)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  product-url: http://localhost:8082 # 👉 Product Service
  order-url: http://localhost:8084 # 👉 Order Service

# ═══════════════════════════════════════════════════════════════════════════════
# JWT SECURITY CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

# 👉 IMPORTANT: Generate a 256-bit Base64 secret
# Linux/Mac: openssl rand -base64 32
# Windows PowerShell:
#   $bytes = New-Object byte[] 32
#   (New-Object System.Security.Cryptography.RNGCryptoServiceProvider).GetBytes($bytes)
#   [Convert]::ToBase64String($bytes)
#
# Must be at least 32 bytes (256 bits) when decoded from Base64
#  secret: your-256-bit-secret-key-here-must-be-long-enough-min-32-bytes
jwt:
  secret: dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIEpXVCB0b2tlbnMhISE=
  # JWT claim tên của userId (thường là "sub")
  user-id-claim: sub

# ═══════════════════════════════════════════════════════════════════════════════
# CART CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

cart:
  # Thời gian cart tồn tại trong Redis (giây)
  # Default: 604800 (7 ngày)
  ttl-seconds: 604800

# ═══════════════════════════════════════════════════════════════════════════════
# ACTUATOR (Health Checks)
# ═══════════════════════════════════════════════════════════════════════════════

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info # Endpoints được expose qua HTTP
  endpoint:
    health:
      show-details: when-authorized # Chi tiết health chỉ khi authorized

---
